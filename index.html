<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dos minutos para ti</title>

<style>

body{

margin:0;

padding:0;

font-family:Arial,sans-serif;

background:#f8f4ef;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

text-align:center;

color:#4e433d;

}

.contenedor{

max-width:600px;

padding:40px;

}

h1{

font-size:52px;

margin-bottom:10px;

}

p{

font-size:22px;

line-height:1.7;

}

button{

margin-top:40px;

padding:18px 45px;

font-size:20px;

border:none;

border-radius:50px;

background:#8b7d6b;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

background:#6d6254;

}

</style>

</head>

<body>

<div class="contenedor">

<h1>❤️</h1>

<h2>Dos minutos para ti</h2>

<p>

Gracias por aceptar este pequeño detalle.

</p>

<p>

Respira.

</p>

<p>

Este mensaje fue escrito pensando en ti.

</p>

<button>

Comenzar

</button>

</div>

</body>

</html>
